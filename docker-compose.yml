# Dùng để chạy nhanh PostgreSQL + Redis cho môi trường dev local
version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solardv
    ports:
      - "5432:5432"
    volumes:
      - solardv_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  solardv_pg_data:
